name: Sync upstream scripts

# Detects upstream drift between scripts/*.sh in this repo and the canonical
# copies in vibe-code-tours/vibecode-setup@main. When a sha differs:
#   1. pull the upstream body into scripts/<name>
#   2. regenerate lib/embedded.gen.js via scripts/build-embed.mjs
#   3. open a PR titled `chore(sync): upstream vibecode-setup snapshot YYYY-MM-DD`
#
# Manual: `gh workflow run sync-upstream.yml`
# Cron:   nightly at 04:17 UTC (off-peak; avoids midnight overlap with releases).

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-and-pr:
    name: Diff upstream + open PR if drift
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      UPSTREAM_BASE: https://raw.githubusercontent.com/vibe-code-tours/vibecode-setup/main
      SCRIPTS: doctor.sh student-setup.sh api-setup.sh check-ch1.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dev deps
        run: npm ci

      - name: Fetch upstream scripts + detect drift
        id: drift
        shell: bash
        run: |
          set -euo pipefail
          changed=()
          mkdir -p .sync-staging
          for name in $SCRIPTS; do
            url="$UPSTREAM_BASE/$name"
            echo "::group::$name"
            tmp=".sync-staging/$name"
            # Fail loudly on 4xx/5xx so we don't silently overwrite with an error page.
            http=$(curl -sSL -o "$tmp" -w '%{http_code}' "$url" || echo 000)
            if [[ "$http" != "200" ]]; then
              echo "::warning::failed to fetch $name (HTTP $http) — skipping"
              echo "::endgroup::"
              continue
            fi
            local_sha=$(sha256sum "scripts/$name" | awk '{print $1}')
            upstream_sha=$(sha256sum "$tmp" | awk '{print $1}')
            echo "local    sha: $local_sha"
            echo "upstream sha: $upstream_sha"
            if [[ "$local_sha" != "$upstream_sha" ]]; then
              echo "diff detected — staging $name for PR"
              mv "$tmp" "scripts/$name"
              changed+=("$name")
            fi
            echo "::endgroup::"
          done
          rm -rf .sync-staging
          if [[ ${#changed[@]} -eq 0 ]]; then
            echo "no upstream drift"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          printf 'changed_files=%s\n' "${changed[*]}" >> "$GITHUB_OUTPUT"

      - name: Regenerate embedded snapshot
        if: steps.drift.outputs.has_changes == 'true'
        run: node scripts/build-embed.mjs

      - name: Verify build + tests still pass after sync
        if: steps.drift.outputs.has_changes == 'true'
        run: |
          npm test
          npm run build

      - name: Stamp date for PR title
        id: date
        if: steps.drift.outputs.has_changes == 'true'
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.drift.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(sync): upstream vibecode-setup snapshot'
          title: 'chore(sync): upstream vibecode-setup snapshot ${{ steps.date.outputs.today }}'
          branch: sync/upstream-vibecode-setup
          delete-branch: true
          labels: |
            sync
            automerge-candidate
          body: |
            Automated upstream snapshot refresh — drift detected in:

            ```
            ${{ steps.drift.outputs.changed_files }}
            ```

            Files touched:
            - `scripts/*.sh` (refreshed bodies)
            - `lib/embedded.gen.js` (regenerated by `scripts/build-embed.mjs`)

            CI ran the test suite + bundle build before this PR opened.

            Generated by `.github/workflows/sync-upstream.yml`.
